<!DOCTYPE html>
<html lang="en">
<head>
<link rel="stylesheet"
    href="style.css">
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Welcome</title>
<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 0;
    background-color: #f4f4f4;
}
.header {
    background-color: #333;
    color: #fff;
    padding: 10px;
    position: relative;
}
.menu {
    font-size: 30px;
    cursor: pointer;
    position: absolute;
    top: 10px;
    left: 10px;
}
.content {
    padding: 20px;
    text-align: center;
}
</style>
</head>
<body>

<div class="header">
    <div class="menu" onclick="toggleMenu()">☰</div>
</div>

<div id="menuLinks" style="display:none; position: absolute; top: 50px; left: 10px; background-color: #fff; border: 1px solid #ccc; padding: 10px; border-radius: 4px;">
    <a href="seniority.html">Seniority List</a><br>
    <a href="contract-rights.html">Contract Rights</a>
</div>

<div class="content">
    <h1>Welcome to the Company Portal</h1>
    <p>Select an option from the menu to view details.</p>
</div>

<script>
function toggleMenu() {
    const menu = document.getElementById('menuLinks');
    if (menu.style.display === 'none') {
        menu.style.display = 'block';
    } else {
        menu.style.display = 'none';
    }
}
</script>

</body>
</html>
