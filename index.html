<!DOCTYPE html>

<head>

    href="style.css">
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Welcome</title>
<style>
body {
  background-image: url("background.jpg");
  background-size: cover;       /* Makes it fill the screen */
  background-position: center;  /* Centers the image */
  background-repeat: no-repeat; /* Prevents tiling */
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 0;
}
.header {
    padding: 10px;
    position: relative;
}
.menu {
    font-size: 30px;
    cursor: pointer;
    position: absolute;
    top: 10px;
    left: 10px;
}
.content {
    padding: 20px;
    text-align: center;
}
</style>
</head>
<body>

<div class="header">
    <div class="menu" onclick="toggleMenu()">☰</div>
</div>

<div id="menuLinks" style="display:none; position: absolute; top: 50px; left: 10px; background-color: #fff; border: 1px solid #ccc; padding: 10px; border-radius: 4px;">
    <a href="driverseniority.html">Driver Seniority List</a><br>
    <a href="contract-rights.html">Contract Rights</a>
</div>

<div class="content">
    <h1>Welcome to UPS Latham Teamsters</h1>
    <p>Here you can view the Senority list and<br> a handy list of your contractual lights.</p>
    <hr>
    <p>If you notice issues with the seniority lists please contact Brad Belanger</p>
</div>

<script>
function toggleMenu() {
    const menu = document.getElementById('menuLinks');
    if (menu.style.display === 'none') {
        menu.style.display = 'block';
    } else {
        menu.style.display = 'none';
    }
}
</script>

</body>
</html>
